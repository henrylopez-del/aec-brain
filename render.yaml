services:
  - type: web
    name: aec-brain-test
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # se setea en el dashboard de Render, NO en git
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: SYSTEM_PROMPT
        sync: false          # el prompt de prueba se pega aqui, sin redeploy
